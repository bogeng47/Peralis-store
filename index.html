<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERALIS STORE - Perlengkapan Alat Tulis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .gradient-bg { background: linear-gradient(180deg, #bef575 0%, #ffffff 50%); }
        .buy-btn { transition: all 0.3s ease; }
        .buy-btn:hover { background-color: #84cc16; transform: scale(1.05); }
    </style>
</head>
<body class="bg-white">

    <!-- HERO BANNER -->
    <div id="home" class="gradient-bg pt-8 pb-12">
        <div class="max-w-7xl mx-auto px-4">
            <div class="grid md:grid-cols-2 gap-8 items-center">
                <div class="space-y-6">
                    <h1 class="text-5xl md:text-6xl font-bold leading-none text-gray-900">
                        PERLENGKAPAN<br>ALAT TULIS
                    </h1>
                    <p class="text-xl text-gray-600 max-w-md">
                        Lengkapi kebutuhan belajar dan kantor Anda dengan produk berkualitas terbaik
                    </p>
                    <button onclick="buyNowHero()"
                            class="buy-btn bg-lime-400 hover:bg-lime-500 text-black font-semibold text-xl px-10 py-4 rounded-3xl flex items-center gap-3 shadow-lg">
                        <span>BUY NOW</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                    <div class="flex items-center gap-6 text-sm">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-check-circle text-lime-500"></i>
                            <span>Gratis Ongkir</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-check-circle text-lime-500"></i>
                            <span>Garansi 100%</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-check-circle text-lime-500"></i>
                            <span>Barang Ready Stock</span>
                        </div>
                    </div>
                </div>

                <!-- Hero Image -->
                <div class="relative">
                    <div class="bg-white rounded-3xl shadow-2xl p-4 rotate-[-2deg] max-w-[380px] mx-auto">
                        <img src="https://picsum.photos/id/1015/800/600"
                             alt="Perlengkapan Alat Tulis Peralis Store"
                             class="rounded-2xl w-full shadow-inner">
                        <div class="absolute top-8 right-8 bg-white text-xs font-bold px-4 py-2 rounded-2xl shadow flex items-center gap-2">
                            <span class="text-lime-500">⭐</span>
                            Terlaris
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="jawa.js"></script>
</body>
</html>
